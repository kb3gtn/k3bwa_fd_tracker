<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARRL Section Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0e14;
      --panel: #0f1520;
      --border: #1e3a5f;
      --accent: #00d4ff;
      --accent2: #00ff9d;
      --worked: #00ff9d;
      --unworked: #1e3a5f;
      --text: #c8d8e8;
      --text-dim: #4a6a8a;
      --header-bg: #060a10;
      --glow: 0 0 10px rgba(0, 212, 255, 0.4);
      --glow2: 0 0 10px rgba(0, 255, 157, 0.4);
      --district-hdr-bg: rgba(0, 212, 255, 0.05);
      --worked-row-bg: rgba(0, 255, 157, 0.04);
      --worked-row-border: rgba(0, 255, 157, 0.15);
      --worked-row-hover: rgba(0, 255, 157, 0.08);
      --hover-bg: rgba(0, 212, 255, 0.05);
      --hover-border: rgba(0, 212, 255, 0.15);
      --checkbox-worked-bg: rgba(0, 255, 157, 0.15);
      --progress-bg: var(--panel);
      --canada-accent: #ff6b35;
      --canada-glow: 0 0 10px rgba(255,107,53,0.4);
    }

    /* Light theme overrides */
    body.light {
      --bg: #f0f4f8;
      --panel: #ffffff;
      --border: #b0c4d8;
      --accent: #0070a8;
      --accent2: #007a4d;
      --worked: #007a4d;
      --unworked: #b0c4d8;
      --text: #1a2a3a;
      --text-dim: #5a7a9a;
      --header-bg: #dce8f0;
      --glow: 0 0 6px rgba(0, 112, 168, 0.25);
      --glow2: 0 0 6px rgba(0, 122, 77, 0.25);
      --district-hdr-bg: rgba(0, 112, 168, 0.07);
      --worked-row-bg: rgba(0, 122, 77, 0.07);
      --worked-row-border: rgba(0, 122, 77, 0.3);
      --worked-row-hover: rgba(0, 122, 77, 0.12);
      --hover-bg: rgba(0, 112, 168, 0.07);
      --hover-border: rgba(0, 112, 168, 0.3);
      --checkbox-worked-bg: rgba(0, 122, 77, 0.15);
      --progress-bg: #dce8f0;
      --canada-accent: #c04a10;
      --canada-glow: 0 0 6px rgba(192,74,16,0.25);
    }

    body.light {
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(0,100,180,0.05) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(0,80,140,0.04) 0%, transparent 60%);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      padding: 20px;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(0,100,180,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(0,60,120,0.06) 0%, transparent 60%);
    }

    header {
      text-align: center;
      padding: 30px 20px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
      position: relative;
    }

    header::after {
      content: '';
      display: block;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin-top: 20px;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      font-weight: 900;
      color: var(--accent);
      text-shadow: var(--glow);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    h1 span {
      color: var(--accent2);
      text-shadow: var(--glow2);
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.2em;
      margin-top: 6px;
      text-transform: uppercase;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      padding: 14px 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
      text-shadow: var(--glow);
    }

    .stat-value.green { color: var(--accent2); text-shadow: var(--glow2); }

    .stat-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      align-items: center;
    }

    .btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text-dim);
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.2s;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: var(--glow);
    }

    .btn.active {
      border-color: var(--accent2);
      color: var(--accent2);
      background: var(--worked-row-bg);
      box-shadow: var(--glow2);
    }

    .filter-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-left: 8px;
    }

    /* Sections layout */
    .sections-container {
      display: flex;
      flex-direction: row;
      gap: 16px;
      align-items: flex-start;
    }

    .us-panel-wrap { flex: 1 1 auto; min-width: 0; }
    .ca-panel-wrap { flex: 0 0 210px; }

    .section-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .section-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
    }

    .section-panel-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: var(--glow);
    }

    .section-panel-title.canada {
      color: var(--canada-accent);
      text-shadow: var(--canada-glow);
    }

    .section-count {
      font-size: 0.68rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    .section-list {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* US Call District grid — 2 rows × 5 cols */
    .district-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0;
      border-top: 1px solid var(--border);
    }

    .district-block {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      min-width: 0;
    }

    /* Last column in each row — no right border */
    .district-block:nth-child(5n) {
      border-right: none;
    }

    /* Bottom row (items 6–10) — no bottom border */
    .district-block:nth-child(n+6) {
      border-bottom: none;
    }

    .district-header {
      background: var(--district-hdr-bg);
      border-bottom: 1px solid var(--border);
      padding: 5px 8px;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .district-num {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      font-weight: 900;
      color: var(--accent);
      text-shadow: var(--glow);
      flex-shrink: 0;
    }

    .district-name {
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .district-items {
      padding: 3px 4px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    /* Individual section row */
    .section-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
    }

    .section-item:hover {
      background: var(--hover-bg);
      border-color: var(--hover-border);
    }

    .section-item.worked-item {
      background: var(--worked-row-bg);
      border-color: var(--worked-row-border);
    }

    .section-item.worked-item:hover {
      background: var(--worked-row-hover);
    }

    /* Custom checkbox */
    .custom-checkbox {
      width: 16px;
      height: 16px;
      border: 1px solid var(--unworked);
      border-radius: 2px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      background: transparent;
    }

    .section-item.worked-item .custom-checkbox {
      border-color: var(--worked);
      background: var(--checkbox-worked-bg);
      box-shadow: var(--glow2);
    }

    .custom-checkbox::after {
      content: '';
      display: none;
      width: 9px;
      height: 5px;
      border-left: 2px solid var(--worked);
      border-bottom: 2px solid var(--worked);
      transform: rotate(-45deg) translateY(-1px);
    }

    .section-item.worked-item .custom-checkbox::after {
      display: block;
    }

    /* Hidden real checkbox */
    .section-item input[type="checkbox"] {
      display: none;
    }

    .abbr-badge {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 1px 5px;
      border-radius: 2px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      min-width: 38px;
      text-align: center;
      transition: all 0.2s;
    }

    .section-item.worked-item .abbr-badge {
      border-color: var(--accent2);
      color: var(--accent2);
      text-shadow: var(--glow2);
    }

    .section-name-text {
      font-size: 0.72rem;
      color: var(--text);
      transition: color 0.2s;
      flex: 1;
      white-space: normal;
      word-break: break-word;
    }

    .section-item.worked-item .section-name-text {
      color: var(--accent2);
    }

    .hidden { display: none !important; }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 20px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.68rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .progress-bar-bg {
      height: 6px;
      background: var(--progress-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 3px;
      transition: width 0.4s ease;
      box-shadow: var(--glow);
    }

    #loading {
      text-align: center;
      padding: 60px;
      color: var(--text-dim);
      letter-spacing: 0.2em;
      font-size: 0.8rem;
    }

    #error-msg {
      text-align: center;
      padding: 40px;
      color: #ff4444;
      letter-spacing: 0.1em;
      font-size: 0.85rem;
    }
    /* Theme toggle — fixed top right */
    .theme-toggle-wrap {
      position: fixed;
      top: 14px;
      right: 20px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .theme-toggle-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      color: var(--text);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      user-select: none;
      white-space: nowrap;
    }

    .theme-switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 22px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .theme-switch input { display: none; }

    .theme-slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 22px;
      transition: background 0.3s;
      border: 1px solid var(--accent);
    }

    .theme-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      top: 2px;
      background: var(--accent);
      border-radius: 50%;
      transition: transform 0.3s, background 0.3s;
      box-shadow: var(--glow);
    }

    .theme-switch input:checked + .theme-slider::before {
      transform: translateX(22px);
    }
  </style>
</head>
<body>

  <div class="theme-toggle-wrap">
    <span class="theme-toggle-label">☀ Day</span>
    <label class="theme-switch" title="Toggle light/dark mode">
      <input type="checkbox" id="theme-toggle" checked>
      <span class="theme-slider"></span>
    </label>
    <span class="theme-toggle-label">Night ●</span>
  </div>

  <header>
    <h1>ARRL <span>Section</span> Tracker</h1>
    <div class="subtitle">Field Day Contact Logger</div>
  </header>

  <div id="loading">&#9654; LOADING SECTION DATA...</div>
  <div id="error-msg" class="hidden"></div>

  <div id="app" class="hidden">
    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="total-worked">0</div>
        <div class="stat-label">Total Worked</div>
      </div>
      <div class="stat">
        <div class="stat-value green" id="us-worked">0</div>
        <div class="stat-label">US Worked</div>
      </div>
      <div class="stat">
        <div class="stat-value green" id="ca-worked">0</div>
        <div class="stat-label">Canada Worked</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="total-sections">0</div>
        <div class="stat-label">Total Sections</div>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="progress-wrap">
      <div class="progress-label">
        <span>Overall Progress</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <span class="filter-label">Show:</span>
      <button class="btn active" id="filter-all" onclick="setFilter('all')">All</button>
      <button class="btn" id="filter-worked" onclick="setFilter('worked')">Worked</button>
      <button class="btn" id="filter-unworked" onclick="setFilter('unworked')">Unworked</button>
      <button class="btn" onclick="clearAll()" style="margin-left:auto;">Clear All</button>
    </div>

    <!-- Lists -->
    <div class="sections-container">
      <!-- US Panel - call district grid -->
      <div class="us-panel-wrap">
        <div class="section-panel">
          <div class="section-panel-header">
            <div class="section-panel-title">&#127482;&#127480; United States</div>
            <div class="section-count" id="us-count"></div>
          </div>
          <div id="us-districts"></div>
        </div>
      </div>

      <!-- Canada Panel - fixed narrow column on the right -->
      <div class="ca-panel-wrap">
        <div class="section-panel">
          <div class="section-panel-header">
            <div class="section-panel-title canada">&#127464;&#127462; Canada</div>
            <div class="section-count" id="ca-count"></div>
          </div>
          <div class="section-list" id="ca-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Theme toggle — default dark
    const themeToggle = document.getElementById('theme-toggle');
    const savedTheme = localStorage.getItem('arrl_theme') || 'dark';
    if (savedTheme === 'light') {
      document.body.classList.add('light');
      themeToggle.checked = false;
    }
    themeToggle.addEventListener('change', () => {
      if (themeToggle.checked) {
        document.body.classList.remove('light');
        localStorage.setItem('arrl_theme', 'dark');
      } else {
        document.body.classList.add('light');
        localStorage.setItem('arrl_theme', 'light');
      }
    });

    let data = { us_sections: [], canadian_sections: [] };
    let currentFilter = 'all';

    const CALL_DISTRICTS = [
      { num: '1', name: 'New England',    abbrs: ['CT','EMA','ME','NH','RI','VT','WMA'] },
      { num: '2', name: 'NY / NJ',        abbrs: ['ENY','NLI','NNY','NNJ','SNJ','WNY'] },
      { num: '3', name: 'PA / DE / MD',   abbrs: ['DE','EPA','MDC','WPA'] },
      { num: '4', name: 'Southeast',      abbrs: ['AL','GA','KY','NC','NFL','PR','SFL','SC','TN','VA','VI','WCF'] },
      { num: '5', name: 'South Central',  abbrs: ['AR','LA','MS','NM','NTX','OK','STX','WTX'] },
      { num: '6', name: 'California',     abbrs: ['EB','LAX','ORG','PAC','SB','SCV','SDG','SF','SJV','SV'] },
      { num: '7', name: 'Mountain / NW',  abbrs: ['AK','AZ','EWA','ID','MT','NV','OR','UT','WWA','WY'] },
      { num: '8', name: 'Great Lakes',    abbrs: ['MI','OH','WV'] },
      { num: '9', name: 'Midwest',        abbrs: ['IL','IN','WI'] },
      { num: '0', name: 'Plains',         abbrs: ['CO','IA','KS','MN','MO','NE','ND','SD'] },
    ];

    async function loadData() {
      try {
        const res = await fetch('arrl_sections.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();

        const saved = localStorage.getItem('arrl_worked');
        if (saved) {
          const workedMap = JSON.parse(saved);
          [...data.us_sections, ...data.canadian_sections].forEach(s => {
            if (workedMap[s.abbreviation] !== undefined) s.worked = workedMap[s.abbreviation];
          });
        }

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        render();
      } catch (e) {
        document.getElementById('loading').classList.add('hidden');
        const err = document.getElementById('error-msg');
        err.classList.remove('hidden');
        err.textContent = '⚠ Could not load arrl_sections.json — make sure it is in the same folder as this HTML file.';
      }
    }

    function saveState() {
      const map = {};
      [...data.us_sections, ...data.canadian_sections].forEach(s => { map[s.abbreviation] = s.worked; });
      localStorage.setItem('arrl_worked', JSON.stringify(map));
    }

    function toggle(abbr, isUS) {
      const list = isUS ? data.us_sections : data.canadian_sections;
      const section = list.find(s => s.abbreviation === abbr);
      if (section) section.worked = !section.worked;
      saveState();
      render();
    }

    function setFilter(f) {
      currentFilter = f;
      ['all','worked','unworked'].forEach(id => {
        document.getElementById('filter-' + id).classList.toggle('active', id === f);
      });
      render();
    }

    function clearAll() {
      if (!confirm('Clear all worked sections?')) return;
      [...data.us_sections, ...data.canadian_sections].forEach(s => s.worked = false);
      saveState();
      render();
    }

    function makeItem(s, isUS) {
      const item = document.createElement('div');
      item.className = 'section-item' + (s.worked ? ' worked-item' : '');
      item.onclick = () => toggle(s.abbreviation, isUS);
      item.innerHTML = `
        <input type="checkbox" ${s.worked ? 'checked' : ''} />
        <div class="custom-checkbox"></div>
        <span class="abbr-badge">${s.abbreviation}</span>
        <span class="section-name-text">${s.section_name}</span>
      `;
      return item;
    }

    function buildUSDistricts() {
      const container = document.getElementById('us-districts');
      container.innerHTML = '';
      const grid = document.createElement('div');
      grid.className = 'district-grid';

      // Build a lookup map
      const lookup = {};
      data.us_sections.forEach(s => { lookup[s.abbreviation] = s; });

      let totalShown = 0;

      CALL_DISTRICTS.forEach(district => {
        const sections = district.abbrs
          .map(a => lookup[a])
          .filter(s => {
            if (!s) return false;
            if (currentFilter === 'worked') return s.worked;
            if (currentFilter === 'unworked') return !s.worked;
            return true;
          });

        if (sections.length === 0 && currentFilter !== 'all') return;

        totalShown += sections.length;

        const block = document.createElement('div');
        block.className = 'district-block';

        const hdr = document.createElement('div');
        hdr.className = 'district-header';
        hdr.innerHTML = `<span class="district-num">${district.num}</span><span class="district-name">${district.name}</span>`;
        block.appendChild(hdr);

        const items = document.createElement('div');
        items.className = 'district-items';
        sections.forEach(s => items.appendChild(makeItem(s, true)));
        block.appendChild(items);

        grid.appendChild(block);
      });

      container.appendChild(grid);
      return totalShown;
    }

    function buildCanada() {
      const container = document.getElementById('ca-list');
      container.innerHTML = '';
      const filtered = data.canadian_sections.filter(s => {
        if (currentFilter === 'worked') return s.worked;
        if (currentFilter === 'unworked') return !s.worked;
        return true;
      });
      filtered.forEach(s => container.appendChild(makeItem(s, false)));
      return filtered.length;
    }

    function render() {
      const usWorked = data.us_sections.filter(s => s.worked).length;
      const caWorked = data.canadian_sections.filter(s => s.worked).length;
      const totalWorked = usWorked + caWorked;
      const total = data.us_sections.length + data.canadian_sections.length;
      const pct = total > 0 ? Math.round((totalWorked / total) * 100) : 0;

      document.getElementById('total-worked').textContent = totalWorked;
      document.getElementById('us-worked').textContent = usWorked + ' / ' + data.us_sections.length;
      document.getElementById('ca-worked').textContent = caWorked + ' / ' + data.canadian_sections.length;
      document.getElementById('total-sections').textContent = total;
      document.getElementById('progress-pct').textContent = pct + '%';
      document.getElementById('progress-fill').style.width = pct + '%';

      const usShown = buildUSDistricts();
      const caShown = buildCanada();

      document.getElementById('us-count').textContent = usShown + ' shown';
      document.getElementById('ca-count').textContent = caShown + ' shown';
    }

    loadData();
